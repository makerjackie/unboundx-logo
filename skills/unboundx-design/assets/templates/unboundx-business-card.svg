  <text x="112" y="450" fill="#606065" font-family="Outfit, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="0.24em">UNBOUNDX / BUSINESS CARD / EDITABLE STARTER</text>
  <text x="585" y="192" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="70" font-weight="800" letter-spacing="-0.04em">NAME</text>
